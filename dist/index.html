mains":["propaganda"],"atmosphere":["scathing"],"crux":["instrumentalization"],"preview":"Is cancer winning\nLet’s outsmart it\nBeat it, battle it, fight it\nConquer the cancer","wordCount":141},{"slug":"we-sense","title":"We Sense","tags":["sense","think","feel","see","mind","world","soul","spirit","found","self"],"domains":["phenomenality"],"atmosphere":["plain"],"crux":["unfindability"],"preview":"We think\nThat we think\nWe sense\nNot think","wordCount":53},{"slug":"wedge","title":"Wedge","tags":["wedge","unholy","marriage","vacuum","expression","creation","connect","protect"],"domains":["privacy","expression"],"atmosphere":["incisive","ironic"],"crux":["paradox"],"preview":"Privacy is an unholy marriage\nA wedge —\nBetween truth\nAnd fear ","wordCount":78},{"slug":"what-medicine-tonight","title":"What Medicine Tonight","tags":["mdma","ayahuasca","cocaine","lsd","marijuana","psilocybin","ketamine","antidepressants","whiskey","cider","choose"],"domains":["sovereignty"],"atmosphere":["sardonic"],"crux":["captivity"],"preview":"What medicine\nWould you choose \nTonight\nA brew of Ayahuasca","wordCount":458},{"slug":"when-i-just-see","title":"When I Just See","tags":["sky","light","past","future","care","see","seeing","outside","stars","nameless"],"domains":["seeing","knowing"],"atmosphere":["spacious","still","serene"],"crux":["primacy"],"preview":"Why would I care to know \nThe speed of light\nThe incalculable distance between stars\nCounts of galaxies and cosmic infinity","wordCount":109},{"slug":"where-the-dead-once-lived","title":"Where The Dead Once Lived","tags":["heart","live","dead","someone","absence","vacant","residence"],"domains":["inhabitation","grief"],"atmosphere":["anguished"],"crux":["irresolution"],"preview":"How does someone\nTake residence — in your heart —\nWhen they don’t even know\nIt’s where they live","wordCount":74},{"slug":"whiskey","title":"Whiskey","tags":["demon","muck","falsehood","narrative","filth","venting","witchcraft","whiskey"],"domains":["narrative","society"],"atmosphere":["caustic","depleted"],"crux":["capitulation"],"preview":"What's most revolting\nRepulsive, odious, loathsome\nNoxious, soul-crushing, corrosive\nPestilent — abhorrent —","wordCount":319},{"slug":"who-cares","title":"Who Cares","tags":["enlightenment","illusion","hungry","school","clocks","delusion","universe","decaying","step"],"domains":["embodiment"],"atmosphere":["sardonic","disenchanted"],"crux":["inconsequence"],"preview":"You are not a human being\nIn a universe, he says\nThen another one says the same\nAnd another","wordCount":278},{"slug":"whom-shall-i-mourn","title":"Whom Shall I Mourn","tags":["ember","glacier","ash","flags","tyrants","chains","flood","mourn","burn","forgotten"],"domains":["suffering","witness"],"atmosphere":["anguish","tenderness"],"crux":["offering","persistence"],"preview":"Whom shall I mourn\nWith this aching heart\nMy brothers\nSisters, mothers and their children","wordCount":171},{"slug":"why-the-fuck","title":"Why The Fuck","tags":["fuck","gutters","chakras","laxatives","profanity","euphemism","faeces","divine","impeccable","tantrum","constipated"],"domains":["purity"],"atmosphere":["deadpan"],"crux":["reductio"],"preview":"Why profanity\nSpeak and write without it\nNo need for those words —\nYou know the ones","wordCount":355},{"slug":"without-script","title":"Without Script","tags":["stage","lines","script","predestined","fate","wrong","crafting","free-will","wandering"],"domains":["impermanence"],"atmosphere":["lucid"],"crux":["errorlessness"],"preview":"Playing on the stage\nWe each play our part —\nNever knowing our lines\nWe make them on the spot","wordCount":100},{"slug":"without-the-word","title":"Without The Word","tags":["thought","building","blocks","universe","word","between","known","unknowing","stillness","silence"],"domains":["logos"],"atmosphere":["lapidary"],"crux":["primacy"],"preview":"Words are the building blocks\nOf thought\nThoughts are the building blocks\nOf the universe","wordCount":69},{"slug":"wonder","title":"Wonder","tags":["pregnant","infinitesimal","condensed","directionless","vanity","bounties","visions","squandered"],"domains":["consciousness","infinity"],"atmosphere":["oracular","compressed"],"crux":["inversion"],"preview":"Unimaginable depths \nStill — \nPregnant \nIncomprehensibly contained","wordCount":32},{"slug":"words","title":"Words","tags":["words","dark","reaching","mapping","handful","soul","igniting","edges","depths","unspeaking"],"domains":["void","language","soul"],"atmosphere":["vast","intimate","tender"],"crux":["retrieval","yield"],"preview":"These words, and a million more —\nWalking, igniting, lighting \nMapping the edges, depths —\nThe infinitude ","wordCount":37},{"slug":"worth-of-an-hour","title":"Worth Of An Hour","tags":["hour","awake","appearance","looker","decay","duvet","fabricated","perceiving","display","worth"],"domains":["presnence","witnessing"],"atmosphere":["inquiring"],"crux":["transparency"],"preview":"From 5:19 to 6:19\nIdle in bed\nDrinking tea\nLooking at the screen","wordCount":284},{"slug":"written-off","title":"Written Off","tags":["pain","mechanics","garage","uniformed","disposed","scrapped","strapped","belongings","fumigate","cordoned"],"domains":["recourse"],"atmosphere":["mordant"],"crux":["disposability"],"preview":"Who shall I ask\nWho shall I ask —\nWho — shall I ask\nAbout this daily pain","wordCount":206},{"slug":"yet","title":"Yet","tags":["being","no-one","world","reader","writer","perceiver","thinker","yet"],"domains":["no-self","world"],"atmosphere":["taut","vertiginous"],"crux":["paradox"],"preview":"You can’t be in — \nThis world \nThere’s only being —\nAnd no one to be","wordCount":85},{"slug":"your-order","title":"Your Order","tags":["order","property","whore","mother","friend","strip","dressed","heels","skin","nails"],"domains":["possession","sex"],"atmosphere":["submission","unease"],"crux":["totalisation"],"preview":"How shall I spread \nHow do I bend\nWashed, shaved\nBrushed and ready —","wordCount":170},{"slug":"your-view","title":"Your View","tags":["time","soon","late","conclusion","logical","impossible","reality","surrendering","allowing","letting","absurdity"],"domains":["temporality"],"atmosphere":["playful"],"crux":["irreducibility"],"preview":"Your View Has anything ever\nHappened — \nA second too soon\nOr an instant too late","wordCount":203}];
const featuredPool = [{"slug":"abrupt","title":"Abrupt","tags":["suddenly","fanfare","anticipation","preparation","intimation","something","no-more"],"content":"# Abrupt\nSuddenly\nWithout fanfare\nAnticipation\nPreparation\nOr intimation —\n\nSomething —\nIs no more"},{"slug":"aloneness","title":"Aloneness","tags":["sweetheart","infinite","aloneness","endure","mine","nothing","compared"],"content":"# Aloneness\nSweetheart\n\nWhat must be\nYour Aloneness —\n\nInfinite\n\nMine’s nothing\nCompared\nTo That\n\nWhat must You\nEndure —\n\nBe —\n\nTo \nBe"},{"slug":"asymmetrical-loss","title":"Asymmetrical Loss","tags":["mourning","buried","burned","fleeting","alone","missing","touched","moments"],"content":"# Asymmetrical Loss\nDo you feel sad  \nNo longer see, hear, touch  \nThe one you loved  \n\nDo you mourn  \nWhat you buried or burned —\nOr your loss\nOf what could have been\n\nDo you mourn\nWhat’s missing in theirs —\nWhat they could have known\n\nDo you reckon yourself alone  \nLeft to hold on to\nFleeting moments\nThey no longer need"},{"slug":"atman","title":"Atman","tags":["eyes","birds","bees","species","seen","anywhere","me","unnamed"],"content":"# Atman\nI have seen —\nThrough the eyes \nOf birds, cats and bees\n\nOf countless unnamed species\nThat once wherever were\n\nThrough the eyes\nOf all that would ever —\nAnywhere be\n\nAnd never once \nHave I seen \nAnyone\n\nBut me"},{"slug":"awake","title":"Awake","tags":["gifts","curses","autumn","recepient","soaked","indifferent","seeing","body"],"content":"# Awake\nGifts\nUnasked for —\nAnd curses\n\nNo recipient\nOf autumn leaves\nStrewn\n\nSeeing —\nIndifferent \nUnmoved\n\nSoaked —\nThe body\nAwake"},{"slug":"awareness","title":"Awareness","tags":["communication","awareness","distinct","objects","apparently","both","possible"],"content":"# Awareness\nNo communication is possible\nBetween two \nApparently distinct objects \n\nUnless, in both\nThere is awareness —\nBecause there is \n\nAwareness in both —\nNo communication is possible"},{"slug":"becoming-unself","title":"Becoming Unself","tags":["strange","self","singular","unrepeatable","seeing"],"content":"# Becoming Unself\nStrange that\n\nYou come into your own —\nBecome yourself\nSingular, unrepeatable\nUnmistakably, irreproducibly\nYourself —\n\nAfter \n\nMuch after —\nDeeply and thoroughly seeing\nUnquestionably realising\n\nThat there is not\nNever was nor could be —\nEither a you\nOr a self"},{"slug":"beholding","title":"Beholding","tags":["facsimile","nothing","beholding","pilgrim","sacred","tourist","behold","sites"],"content":"# Beholding\nFacsimile \nOf nothing\nEvery which way\n\nPilgrim no more\nOf sacred sites \nOr tourist attractions\n\nI behold myself\nIn beholding"},{"slug":"bittersweet","title":"Bittersweet","tags":["grief","happiness","undercurrent","being"],"content":"# Bittersweet\nIf\nHappiness is\nAn unrelenting undercurrent\n\nOf grief\nPervading my being\n\nThen\nI am happy"},{"slug":"both-irrefutably","title":"Both Irrefutably","tags":["both","irrefutably","truths","no-self","sovereignty","individual","inverted","societies","verfiable","factual"],"content":"# Both Irrefutably\nIndividual sovereignty and no self\nAppear to be\nMutually exclusive\nEven counter-cancelling\n\nYet both are irrefutably \nSimultaneously —\nFactual and self-verifiable\n\nAnd both —\nAre the most subverted\nInverted \nTruths —\n\nFor societies\nTo be"},{"slug":"cobwebs","title":"Cobwebs","tags":["traditions","institutions","cobwebs","spiders","mind","dead"],"content":"# Cobwebs\nTraditions and Institutions\nAre the dead —\nThat live\n\nAs cobwebs \nWith big, hairy spiders\n\nIn the mind"},{"slug":"contentment","title":"Contentment","tags":["explore","expanse","reach","glad","content"],"content":"# Contentment\nI came to explore\nThe expanse\nOf my interminable reach —\nAnd that I did\n\nAnd for that\nI am glad —\nContent"},{"slug":"de-supposition","title":"De-Supposition","tags":["enlightenment","knower","doer","questioner","supposed","de-supposition"],"content":"# De-Supposition\nDe-supposition\nOf the supposed questioner\nOf the knower\nOf the doer\n\nWhat — without this\nCould ever be\nEnlightenment"},{"slug":"definition","title":"Definition","tags":["defines","confines","corpse","tombstones","named","carved"],"content":"# Definition\nWhatever defines you \nConfines you\n\nWithout definition\nYou are \nBut a corpse\n\nStill\nWe put tombstones \nNamed, carved in —\nUpon corpses"},{"slug":"dot","title":"Dot","tags":["dissolving","dot","page","infinite","ink","sound"],"content":"# Dot\nWhat would you call it\n\nWhen a dot \nUpon an infinite page\nKnows it’s dot —\nDissolving \nUpon the infinite page\n\nThe ink\nBeing the sound\n\nThe dot\nThe page"},{"slug":"emptiness","title":"Emptiness","tags":["empty","vacant","myself","rooted","remote"],"content":"# Emptiness\nEmpty, not vacant\nRemote, not distant\nI am\n\nRooted —\nI am\nIn MySelf"},{"slug":"equanimity","title":"Equanimity","tags":["certainty","uncertainty","transparent","grief","grasping"],"content":"# Equanimity\nNo certainty\nNo uncertainty\n\nNo reaching\nNo grasping\n\nStill, quiet\nTinged by\n\nA transparent grief"},{"slug":"equivalence","title":"Equivalence","tags":["place","instant","measure","life","noticed"],"content":"# Equivalence\nHave you noticed \nThe measure of life\nIn any instant\nAny place\n\nIs never more nor less\nThan any other"},{"slug":"eternal","title":"Eternal","tags":["world","escape","alive","entered"],"content":"# Eternal\nYou\nCan never, escape this world alive \n\nBut the\nYou, that can \nNever entered this world"},{"slug":"eternity","title":"Eternity","tags":["gaze","night","bright","understanding","awaiting","thousand"],"content":"# Eternity\nTen thousand years and more\nI have stood\nIn your gaze —\n\nBright as day\nStill as night\n\nTen thousand years and more\nI would stand\nAwaiting\nYour return"},{"slug":"extinction","title":"Extinction","tags":["will","lost","I","me","died"],"content":"# Extinction\nThe will to live \nHas died — out of me\nOr in me \nI don’t know which\n\nIt’s not that \nI have lost it\n\nThe will to live has died \nLeaving me without\nThe will to live"},{"slug":"folding","title":"Folding","tags":["sleep","wake","dawn","dark","folds","world"],"content":"# Folding\nI sleep\nAnd then, I wake\nSit through the dark until dawn\nKnowing the entire world of the day\n\nMyself included \nFolds \nIn sleep"},{"slug":"found-and-dropped","title":"Found And Dropped","tags":["nest","left","bird","sticks","dried"],"content":"# Found And Dropped\nCupped among branches\nShaded up high — few sticks, twigs\nSome fur and feathers\nSecretions dried\n\nWith found and dropped\nA bird nest made\n\nLeft behind"},{"slug":"futility","title":"Futility","tags":["futility","death","stirring","slaying","pretence","creation"],"content":"# Futility\nFutility raises its head\nStirring in bed with death\n\nBefore, during \nAnd after\n\nEach first step\nAll acts of creation\n\nSlaying, wasting —\nEvery pretence"},{"slug":"genesis","title":"Genesis","tags":["touch","another","world","problems"],"content":"# Genesis\nOnly\nIf, only\nOne could touch —\nAnother \n\nThere would be\nNo world\n\nNo problems\nIn world"},{"slug":"good-news","title":"Good News","tags":["insomnia","ending","dreams","authority","penance","imprisonment","oblivion"],"content":"# Good News\nThe days\nOf authority\nPenance\nAnd imprisonment —\n\nThe nights \nOf dreams\nInsomnia\nAnd oblivion —\n\nAre ending"},{"slug":"here","title":"Here","tags":["human","here","is","you","smoke","I"],"content":"# Here\nHuman, or not —\nHere you are\nAnd here I am\n\nHere, then, is —\nYou and I\nMere wisps of smoke"},{"slug":"insatiability","title":"Insatiability","tags":["satisfy","enough","experience","world","ever","you"],"content":"# Insatiability\nNo experience \nOf this world or any other\nCan ever satisfy \n\nOr be enough\nFor you"},{"slug":"mind","title":"Mind","tags":["mind","mechanism","beholder","beheld","beholding","appearing","language","culture"],"content":"# Mind\nMind\nIs the mechanism\nBeheld, beholder and beholding\nOf appearing\n\nLanguage splits the mechanism\nInto body-mind-beholder\nAnd a separate beheld\n\nAnd culture \nSurvives to ensure\nThe beholder remains intact"},{"slug":"mind-alone","title":"Mind Alone","tags":["mind","eyes","objects","touch","organs","sense","world","self","dies","births"],"content":"# Mind Alone\nImages \nDo not contact eyes\nBut mind\n\nObjects\nDo not touch\nSense organs\nBut mind\n\nIn mind alone —\nTainted by thought —\nBirths, lives and dies\nThe world\nAnd self"},{"slug":"no-mind","title":"No Mind","tags":["mind","no-mind","negation","already"],"content":"# No Mind\nNo mind\nRefers to an absurd\nConceptual negation\nOf mind\n\nThat already itself is\nNo mind"},{"slug":"no-path","title":"No Path","tags":["infinity","paths","think"],"content":"# No Path\nDid you really think\nThat there could be\n\nPaths\n\nIn infinity —\n\nTo \n\nInfinity"},{"slug":"non-attachment","title":"Non-attachment","tags":["disbelief","believing","incapable","dream","failure","fortune","wishing","weaving"],"content":"# Non-attachment\nRendered incapable\nOf believing \nOf suspending disbelief\n\nOf common pleasures\nPlanning, wishing \nAnd dream-weaving\n\nOf being moved\nBy the gusts\nOf fortunes and failures\n\nI sit"},{"slug":"nonduality","title":"Nonduality","tags":["nonduality","possibilities","two","I","god"],"content":"# Nonduality\nThere can only be \nTwo possibilities\n\nEither I \nEquals God\n\nOr I \nDo not exist"},{"slug":"none","title":"None","tags":["none","nights","mornings","days","skies","air","light","touch"],"content":"# None\nLate-nights won’t always be here\nNor early mornings, late evenings\n\nNo days will be here\nNo sun, no sky\nNo air, no light, no touch\n\nBut then none will be\nTo know the none\nThat won’t be\n\nSo none could say\nWhether none will\nOr won’t be"},{"slug":"not-paradox","title":"not-Paradox","tags":["buddhas","sage","saviour","enlightenment","ignorance","superior","equal","alone"],"content":"# not-Paradox\nI am equal \nTo all the Buddhas\nOf all times \nNo sage or saviour — \nMy superior\n\nBeyond\nEnlightenment and ignorance\nBirth and death —\nI alone Am\n\nNo one my equal\nNo one —\nBut I"},{"slug":"nothing-to-do-with-him","title":"Nothing To Do With Him","tags":["writing","immortality","substantiation","timeless","giving","talking","exists","nothing","him","man"],"content":"# Nothing To Do With Him\nThrough writing —\nMan gives himself substantiation\nThat does not exist\nIn him\n\nTalking about timeless\nHe gives himself\nImmortality —\nThat has nothing to do \nWith him"},{"slug":"now","title":"Now","tags":["tomorrow","yesterday","today","day","new","one","only","step","resting"],"content":"# Now\nIn reviewing tomorrow’s \nEach step as yesterday’s\nToday becomes\nThe only new day\n\nIn viewing today’s\nEach step as yesterday’s\nTomorrow becomes\nThe one new day\n\nThe one and only —\nTomorrow and today\nResting on yesterday —\nThe singular day"},{"slug":"nowhere","title":"Nowhere","tags":["physicality","ethereality","nowhere","sleep","suspended","world","erasing","making"],"content":"# Nowhere\nThis world woken up \nBy physicality’s calls —\n\nSuspended in sleep \nShows ethereality’s world\n\nAnd both their making —\nIn nowhere \nErasing"},{"slug":"oblivion","title":"Oblivion","tags":["state","waking","sleep","dream","reality","actuality","oblivion","truth","place"],"content":"# Oblivion\nWaking state\nDream state\nSleep state\n\nIn any state\nAt any place\n\nOblivion is —\nThe truth\nReality\nActuality\n\nOf it all"},{"slug":"older-as-young","title":"Older As Young","tags":["older","young","adult","adolescence","adulthood","remebering","caught"],"content":"# Older As Young\nI was older as young\nGrowing younger as adult \nCaught in adolescence \nDuring adulthood\n\nUntil getting older\nRemembering —\nI was as older as young"},{"slug":"one-way","title":"One-Way","tags":["shame","wall","psychic","skin","clothes","naked","door","nude"],"content":"# One-Way\nCivility is a one-way door\nThat once entered\nBrands shame\nIn the gap between skin\nAnd the clothes\n\nSo even unclothed\nAnd nude\nOne can never again\nBe meaninglessly naked\n\nIn the psychic walls of the gap\nAre desires structured \nImagination inhabited —\nDeath planted"},{"slug":"paradox","title":"Paradox","tags":["nobody","somebody","place","anybody","everyone","anyone"],"content":"# Paradox\nI’d rather be nobody\nIn a place where\nAnyone can be anybody \n\nThan be somebody\nIn a place where \nEveryone is nobody"},{"slug":"presence","title":"Presence","tags":["thought","pee","sensing","time","now","nature"],"content":"# Presence\nWhat if I didn’t think\nRight now\n\nI’d sit \nOr lie down \nSensing —\n\nThrough unknown time \nUntil\n\nNature calls\nWith the thought\nOf getting up\n\nTo pee"},{"slug":"proxy","title":"Proxy","tags":["cacophonous","behalf","dumb","screaming","speak","word","god"],"content":"# Proxy\nOne word\nJust say — today\n\nI know you wouldn’t\nSo I’ll speak\nYet again\nOn your behalf\n\nYou dumb dumb\nDumb —\nCacophonous\nScreaming\nGod"},{"slug":"seamless","title":"Seamless","tags":["seamless","beholding","unbroken","senses","ordinary"],"content":"# Seamless\nSeamlessly blended\nIn unbroken beholding —\nA million senses\nThis —\nOrdinary day"},{"slug":"second-hand-god","title":"Second Hand God","tags":["fanatics","holy","inherited","ingested","borrowed","proselytising","righteousness","discovered","haunted"],"content":"# Second Hand God\nReligious fanatics —\nHaunted \nBy their holy books\n\nAcademics —\nReferencing, pointing\nProselytising\n\nUnshakeably convinced\nAbout their ingested worldviews\nTheir inherited righteousness\nTheir — never discovered — version\n\nOf wholly borrowed\nSecond hand God"},{"slug":"shadow","title":"Shadow","tags":["shadow","integration","will","apparition"],"content":"# Shadow\nWhy speak of integrating something —\nThat you do not cast\nThat does not belong to you\nThat has no will of its own\nAnd is never apart from you\n\nAnd if that something\nIs not even a thing\nBut merely an apparition"},{"slug":"silence","title":"Silence","tags":["narrative","words","fail","imaginings","speech","recollections","dissolve","grasped"],"content":"# Silence\nWhen all narratives end —\nAll recollections\nImaginings dissolve\n\nWhen all speech\nAnd words\nOnly fail\n\nWhen nothing\nIs grasped"},{"slug":"size-of-concern","title":"Size Of Concern","tags":["attention","size","concern","space","stakes","depend"],"content":"# Attention\nDoes the size\nOf a concern\nDepend upon its life-or-death stakes\nOr\nUpon the space it takes\nIn attention"},{"slug":"sleep-s-sky","title":"Sleep's Sky","tags":["spark","swirling","unforming","dark","closed","displayed","worlds","sky","eyes"],"content":"# Sleep’s Sky\nIn the quiet dark —\nSpark all worlds \nSwirling beneath eyes closed\nAnd displayed out in open —\nUnforming \nIn sleep’s sky"},{"slug":"source","title":"Source","tags":["will","wavering","unwavering","objects","source"],"content":"# Source\nNot a wavering will but\nThe Unwavering Source\nInspires and drives\nThis \nAnd all objects"},{"slug":"spirituality","title":"Spirituality","tags":["cornucopia","menu","plug-ins","product","feet","perceptions","spirituality","body","thoughts"],"content":"# Spirituality\nEmbodiment —\nWhat a product\nIn the cornucopia\nOf spirituality\n\nBuy back —\nYour own feet\nHead \nAnd body\n\nFor thoughts, emotions\nSensations \nPerceptions \nPlug-ins —\n\nSee the menu"},{"slug":"split-mind","title":"Split-Mind","tags":["mind","cares","moves","that","split","tolerate"],"content":"# Split-Mind\nSplit —\n\nMind is\nThat which\nCannot tolerate what is\nAnd cares that it cannot\n\nThat which\nMoves\nAnd cares that it does"},{"slug":"stillness-in-motion","title":"Stillness In Motion","tags":["beauty","stillness","light","skin","perceived","perceiving","motion","emphemerality"],"content":"# Stillness In Motion\nEphemerality perceived\nIn a wisp of breeze\nOn your skin\nA ray of light\nSliding down the sky\nTo your window\n\nWhat is beauty\nBut perceiving —\nPerceiving itself\nIn motion \n\nAnd what is motion\nBut stillness\nPerceived"},{"slug":"surrender","title":"Surrender","tags":["peace","ocean","majesty","still","being","embrace","stone"],"content":"# Surrender\nPeace, O Peace\nYour Majesty\nUntouched\nStill\nUnwavering \n\nLike a stone\nTossed in the ocean \nI drop —\nIn your being\n\nYou embrace\nMy being"},{"slug":"the-aloneness","title":"The Aloneness","tags":["god","aloneness","man","heart","made","rest","worlds"],"content":"# The Aloneness\nThe aloneness —\nIn man’s heart\nIs God’s \n\nIt is out of that \nHe made —\nAll worlds\n\nAnd into which\nThey rest"},{"slug":"this-is-it","title":"This Is It","tags":["this","is","it"],"content":"# This Is It\nThis Is It\nTHIS is it\nThis IS it\nThis is IT\n\nThis Is It"},{"slug":"to","title":"To —","tags":["god","swell","chest","silence","bowed","word","exhale","gesture"],"content":"# To —\nGod\n\nNot a single word more\nHave I got left to say\nNot a single gesture more\nLeft to make\n\nAnd if I must —\nWhat but\nA swell \nIn my chest\nAn exhale\n\nA silence\nBowed"},{"slug":"trumpet","title":"Trumpet","tags":["body","vessel","trumpet","god","dust","unheard"],"content":"# Trumpet\nThis body \nVessel —\nAnd the only\nTrumpet of God  \n\nUnheard would God be\nWithout this lump\nOf dust"},{"slug":"two-deaths","title":"Two Deaths","tags":["aware","body","unaware","sleep","waking","births","dies","someone","no-one","I"],"content":"# Two Deaths\nUnaware \nOf being aware\nThe body sleeps\nWakes, lives\nBirths and dies —\n\nFor someone \n\nAware \nOf being aware\nOf being the body\nOf itself and the world\n\nI wakes\nBirths, lives\nAnd dies —\n\nFor no one"},{"slug":"umbilical-cord","title":"Umbilical Cord","tags":["cord","cut","one","separation","first","second","alone","not-two","what","whom","when"],"content":"# Umbilical Cord\nWhat happened \nWhen the cord was cut —\n\nSeparation\n\nOne became two\nBut — not two \n\nOne became \nOne\nAnd One\n\nThe first one — alone\nThe second one — alone\n\nA gazillion — \nAlone\n\nWhat got separated, then —\n\nFrom whom"},{"slug":"un","title":"Un —","tags":["full","empty","null","not-be","expressed","spoken","unexpressed","unspeakable","beyond"],"content":"# Un —\nTo be full\nYou must be empty\n\nTo be empty\nYou must be null\nNot-be\n\nTo not-be\nYou must be\n\nBeyond full\nAnd empty —\n\nUnexpressed\nUnspeakable\nUn —\n\nAll expressed\nSpoken"},{"slug":"undercurrent","title":"Undercurrent","tags":["beauty","love","passing","undercurrent"],"content":"# Undercurrent\nBeauty and love\n\nWhat \nWithout the undercurrent\n\nOf passing"},{"slug":"unhindered","title":"Unhindered","tags":["silence","soul","right","speaking","manner","demands","unhindered"],"content":"# Unhindered\nUnhindered\nBy demands of decorum\nAnd right manner\nOf speaking \n\nMy soul —\nSpeaks\nIn silence"},{"slug":"uniqueness","title":"Uniqueness","tags":["path","aphorism","solitude","wisdom","skin","individuality"],"content":"# Uniqueness\nThe path of no one else\nCan ever\nBe yours\n\nTracing the paths\nOthers walked\nRemember —\n\nNo one has ever —\nTaken a single step\nIn another’s skin"},{"slug":"unnameable","title":"Unnameable","tags":["defined","described","conceived","located","created","destroyed","perceived","companioned","not"],"content":"# Unnameable\nWill not be defined\nWill not be described\nWill not be conceived\n\nWill not be perceived\nWill not be located\nWill not be companioned\n\nWill not be created\nWill not be destroyed"},{"slug":"vanishing-point","title":"Vanishing Point","tags":["play","audience","theatre","found","knowing","known","nowhere","player","tell"],"content":"# Vanishing Point\nWhat’s a play\nIn which — about which —\nYou cannot tell\n\nWhether you are the audience\nThe play, theatre \nOr the player \n\nAnd even if there really is\nA play  \n\nAnd when the you\nThat cannot tell\nIs nowhere found\n\nWhat becomes, then\nOf not knowing\nWhat’s not known"},{"slug":"vanity","title":"Vanity","tags":["paradox","silence","absence","aphorism","word"],"content":"# Vanity\nAll is vanity — Maya\nAttainments — conceit\n\nMeanings —\nBarking of a dog\n\nNothing exists \nTo say\nThat nothing exists \nForever\n\nNor any final word\nAbout all\nThat is —\nAnd isn’t"},{"slug":"words","title":"Words","tags":["words","dark","reaching","mapping","handful","soul","igniting","edges","depths","unspeaking"],"content":"# Words\nThese words, and a million more —\nWalking, igniting, lighting \nMapping the edges, depths —\nThe infinitude \nOf void —\n\nThey go in, reach — and keep reaching \nToward nothing\nUnspeaking dark \n\nAnd bring out \nA handful \nOf a soul"}];
const base = "/barking";


  // ── HTML sanitiser — prevents <> in search queries breaking the layout ─────
  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── Highlight matched query text in a result title ─────────────────────────
  function highlight(text, q) {
    const safe = escapeHtml(text);
    const escapedQ = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const re = new RegExp(`(${escapedQ})`, 'gi');
    return safe.replace(re, '<mark style="background:var(--accent);color:var(--bg)">$1</mark>');
  }

  // ── Featured poem ──────────────────────────────────────────────────────────
  const pool = featuredPool.slice().sort(() => Math.random() - 0.5);
  let idx = 0;

  function renderFeatured(poem) {
    const lines = poem.content.split('\n').filter(l => !l.startsWith('#'));
    while (lines.length && !lines[0].trim()) lines.shift();
    while (lines.length && !lines[lines.length - 1].trim()) lines.pop();
    const bodyHtml = lines.map(l =>
      l.trim() ? `<p>${escapeHtml(l)}</p>` : `<p class="stanza-break"></p>`
    ).join('');

    const tagHtml = poem.tags.slice(0, 3).map(t =>
      `<a href="${base}/browse?tag=${encodeURIComponent(t)}" class="tag">${escapeHtml(t)}</a>`
    ).join('');

    const nextBtn = pool.length > 1
      ? `<button class="refresh-btn" id="next-poem-btn">another poem</button>`
      : '';

    document.getElementById('featured').innerHTML = `
      <a href="${base}/poem/${poem.slug}" class="featured-title">${escapeHtml(poem.title)}</a>
      <div class="featured-body">${bodyHtml}</div>
      <div class="featured-footer">
        ${tagHtml}
        ${nextBtn}
      </div>
    `;
    if (pool.length > 1) {
      document.getElementById('next-poem-btn').addEventListener('click', nextPoem);
    }
  }

  function nextPoem() {
    idx = (idx + 1) % pool.length;
    renderFeatured(pool[idx]);
  }

  renderFeatured(pool[idx]);

  document.getElementById('random-btn').addEventListener('click', () => {
    const rand = pool[Math.floor(Math.random() * pool.length)];
    window.location.href = `${base}/poem/${rand.slug}`;
  });

  // ── Search ─────────────────────────────────────────────────────────────────
  const input   = document.getElementById('search-input');
  const results = document.getElementById('search-results');

  input.addEventListener('input', () => {
    const q = input.value.trim().toLowerCase();
    if (q.length < 2) { results.classList.remove('open'); return; }

    const matches = searchIndex.filter(p => {
      return p.title.toLowerCase().includes(q)
        || p.tags.some(t        => t.toLowerCase().includes(q))
        || p.domains.some(t     => t.toLowerCase().includes(q))
        || p.atmosphere.some(m  => m.toLowerCase().includes(q))
        || p.crux.some(f        => f.toLowerCase().includes(q))
        || (p.preview && p.preview.toLowerCase().includes(q));
    }).slice(0, 7);

    if (!matches.length) {
      results.innerHTML = `<div class="search-empty">No poems found for "${escapeHtml(q)}"</div>`;
    } else {
      results.innerHTML = matches.map(p => {
        const meta = [...p.atmosphere, ...p.crux, ...p.domains.slice(0, 2)]
          .filter(Boolean).join(' · ');
        return `<a href="${base}/poem/${p.slug}" class="search-result-item">
          <span class="sri-title">${highlight(p.title, q)}</span>
          ${meta ? `<span class="sri-meta">${escapeHtml(meta)}</span>` : ''}
        </a>`;
      }).join('');
    }
    results.classList.add('open');
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('.search-wrap')) results.classList.remove('open');
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Escape') { results.classList.remove('open'); input.blur(); }
    if (e.key === 'Tab')    { results.classList.remove('open'); }
    if (e.key === 'Enter') {
      const first = results.querySelector('.search-result-item');
      if (first) window.location.href = first.href;
    }
  });
})();</script>  </main> <!-- Theme switcher — present on every page via Base.astro --> <div class="theme-switcher" aria-label="Choose colour theme"> <button class="theme-dot" data-theme="ivory" title="Warm ivory"></button> <button class="theme-dot" data-theme="slate" title="Charcoal slate"></button> <button class="theme-dot" data-theme="graphite" title="Warm graphite"></button> </div>  </body></html>
